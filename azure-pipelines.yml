# ASP.NET Core
# Build and test ASP.NET Core projects targeting .NET Core.
# Add steps that run tests, create a NuGet package, deploy, and more:
# https://docs.microsoft.com/azure/devops/pipelines/languages/dotnet-core

trigger:
- main

pool:
  name: SelfHosted
  demands:
  - agent.name -equals ZISHMANSON

steps:
- checkout: self
  clean: true

# Install SonarScanner (.NET global tool)
- script: |
    dotnet tool install --global dotnet-sonarscanner
    echo "##vso[task.prependpath]%USERPROFILE%\.dotnet\tools"
  displayName: "Install SonarScanner"

# Run SonarCloud analysis using CLI (works in all regions)
- script: |
    dotnet-sonarscanner begin /k:"zishmanson_my-first-azure-devops" /o:"zishmanson" /d:sonar.login="$(SONAR_TOKEN)" /d:sonar.host.url="https://sonarcloud.io"
    dotnet build --configuration Release
    dotnet-sonarscanner end /d:sonar.login="$(SONAR_TOKEN)"
  displayName: "Run SonarCloud Analysis"
